{{ if .Values.components.loki.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-loki-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: loki-netpol
      values: |
        resources:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-same-namespace
              namespace: loki-system
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                  - podSelector: {}
              egress:
                - to:
                  - podSelector: {}
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-azure-storage-from-loki
              namespace: loki-system
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: loki
              egress:
                - ports:
                    - protocol: TCP
                      port: 443    
                  to:
                    - ipBlock:
                        cidr: 0.0.0.0/0
              policyTypes:
                - Egress
          {{- if eq .Values.global.provider "aws" }}
          # On AWS with EKS Pod Identity, the Pod Identity Agent serves temporary credentials from the
          # link-local endpoint 169.254.170.23:80 (IPv6 [fd00:ec2::23]:80). Loki needs this path to obtain
          # IAM credentials for its S3 chunk/index object storage backend.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-eks-pod-identity-from-loki
              namespace: loki-system
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: loki
              egress:
                - ports:
                    - protocol: TCP
                      port: 80
                  to:
                    - ipBlock:
                        cidr: 169.254.170.23/32
                    - ipBlock:
                        cidr: fd00:ec2::23/128
              policyTypes:
                - Egress
          {{- end }}
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-ingress-from-platform-logging-to-loki
              namespace: loki-system
            spec:
              ingress:
              - ports:
                - port: 8080
                  protocol: TCP
                from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: prometheus-system
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: grafana
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: fluent-operator-system
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: fluentd
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: event-logging-system
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: kubernetes-event-exporter
              podSelector:
                matchLabels:
                  app.kubernetes.io/component: gateway
              policyTypes:
              - Ingress
          - apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: allow-egress-from-loki-to-alertmanager
            namespace: loki-system
                spec:
                  egress:
                  {{- range (required "global.alertManagerCidrs is required" .Values.global.alertManagerCidrs) }}
                    - ports:
                        - protocol: TCP
                          port: 443
                      to:
                        - ipBlock:
                            cidr: {{ . | quote }}
                  {{- end }}
            podSelector:
              matchLabels:
                app.kubernetes.io/name: loki
            policyTypes:
            - Egress
  destination:
    name: {{ .Values.global.cluster }}
    namespace: loki-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
