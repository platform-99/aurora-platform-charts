{{ if .Values.components.podtracker.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-podtracker-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: podtracker-netpol
      values: |
        resources:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-ingress-from-prometheus-to-podtracker
              namespace: podtracker-system
            spec:
              ingress:
              - from:
                - namespaceSelector:
                    matchLabels:
                      namespace.ssc-spc.gc.ca/purpose: system
                      kubernetes.io/metadata.name: prometheus-system
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
                      app.kubernetes.io/instance: kube-prometheus-stack-prometheus
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: podtracker
                  app.kubernetes.io/instance: podtracker
              policyTypes:
              - Ingress
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-ingress-from-apiserver-to-podtracker
              namespace: podtracker-system
            spec:
              description: |
                API server reaches podtracker webhooks and metrics endpoints.
              endpointSelector: {}
              ingress:
                - fromEntities:
                    - kube-apiserver
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-apiserver-from-podtracker
              namespace: podtracker-system
            spec:
              description: |
                podtracker watches pods via the Kubernetes API.
                Ports 443 and 6443 cover both ways the API server is reached: the in-cluster
                kubernetes Service (443) and the API server's native secure port (6443).
              endpointSelector:
                matchLabels:
                  app.kubernetes.io/name: podtracker
              egress:
                - toEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "443"
                        - port: "6443"
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
