{{ if .Values.components.kubecost.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-kubecost-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: kubecost-netpol
      values: |
        resources:
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-apiserver-from-kubecost-finops-agent
              namespace: kubecost-system
            spec:
              description: |
                Kubecost finops agent queries cluster resources via the Kubernetes API.
                Ports 443 and 6443 cover both ways the API server is reached: the in-cluster
                kubernetes Service (443) and the API server's native secure port (6443).
              endpointSelector:
                matchLabels:
                  app.kubernetes.io/part-of: finops-agent
              egress:
                - toEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "443"
                        - port: "6443"
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-apiserver-from-kubecost-aggregator
              namespace: kubecost-system
            spec:
              description: |
                Kubecost aggregator queries cluster resources via the Kubernetes API.
                Ports 443 and 6443 cover both ways the API server is reached: the in-cluster
                kubernetes Service (443) and the API server's native secure port (6443).
              endpointSelector:
                matchLabels:
                  app.kubernetes.io/name: aggregator
              egress:
                - toEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "443"
                        - port: "6443"
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-fetch-pricing
              namespace: kubecost-system
            spec:
              egress:
              - ports:
                - port: 443
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector:
                matchLabels:
                  app.kubernetes.io/part-of: finops-agent
              policyTypes:
              - Egress
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-azuremetadataapi-from-kubecost
              namespace: kubecost-system
            spec:
              egress:
              - ports:
                - port: 80
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: {{ .Values.global.azureMetadataApiCidr }}
              podSelector:
                matchLabels:
                  app.kubernetes.io/part-of: finops-agent
              policyTypes:
              - Egress
          {{- if eq .Values.global.provider "aws" }}
          # On AWS with EKS Pod Identity, the Pod Identity Agent serves temporary credentials from the
          # link-local endpoint 169.254.170.23:80 (IPv6 [fd00:ec2::23]:80). The finops agent needs this
          # path to obtain IAM credentials for AWS billing/pricing APIs.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-eks-pod-identity-from-kubecost
              namespace: kubecost-system
            spec:
              egress:
              - ports:
                - port: 80
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: 169.254.170.23/32
                - ipBlock:
                    cidr: fd00:ec2::23/128
              podSelector:
                matchLabels:
                  app.kubernetes.io/part-of: finops-agent
              policyTypes:
              - Egress
          {{- end }}
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name:  allow-same-namespace
              namespace: kubecost-system
            spec:
              egress:
              - to:
                - podSelector: {}
              ingress:
              - from:
                - podSelector: {}
              podSelector: {}
              policyTypes:
              - Ingress
              - Egress
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-ingress-from-bill-of-landing-to-kubecost
              namespace: kubecost-system
            spec:
              ingress:
                - ports:
                    - port: 9090
                      protocol: TCP
                  from:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: bill-of-landing-system
                      podSelector:
                        matchLabels:
                          app.kubernetes.io/instance: bill-of-landing
                          app.kubernetes.io/name: bol
              podSelector:
                matchLabels:
                  app.kubernetes.io/part-of: finops-agent
              policyTypes:
                - Ingress
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-finops-agent-to-node-3001
              namespace: kubecost-system
            spec:
              # This targets only the specific pod
              endpointSelector:
                matchLabels:
                  app.kubernetes.io/part-of: finops-agent
              egress:
              - toEntities:
                - host
                - remote-node
                toPorts:
                - ports:
                  - port: "3001"
                    protocol: TCP
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}