{{ if .Values.components.verticalPodAutoscaler.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-vertical-pod-autoscaler-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: vertical-pod-autoscaler-netpol
      values: |
        resources:
          # Baseline for a default-deny namespace: intra-namespace traffic (probes, webhook Service, certgen Job).
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-same-namespace
              namespace: vertical-pod-autoscaler-system
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                  - podSelector: {}
              egress:
                - to:
                  - podSelector: {}
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-ingress-from-apiserver-to-vpa
              namespace: vertical-pod-autoscaler-system
            spec:
              description: |
                API server calls the VPA admission webhook.
              endpointSelector:
                matchLabels:
                  app.kubernetes.io/name: vpa
                  app.kubernetes.io/component: admission-controller
              ingress:
                - fromEntities:
                    - kube-apiserver
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-apiserver-from-vpa
              namespace: vertical-pod-autoscaler-system
            spec:
              description: |
                VPA recommender, updater, and admission-controller use the Kubernetes API.
                Ports 443 and 6443 cover both ways the API server is reached: the in-cluster
                kubernetes Service (443) and the API server's native secure port (6443).
              endpointSelector:
                matchLabels:
                  app.kubernetes.io/name: vpa
              egress:
                - toEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "443"
                        - port: "6443"
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
