{{ if .Values.components.externalSecrets.enabled -}}

{{- $annotations := dict }}
{{- range $k, $v := (.Values.components.externalSecrets.serviceAccount.annotations | default dict) }}
{{- $_ := set $annotations $k $v }}
{{- end }}
{{- if and (eq .Values.global.provider "azure") .Values.components.externalSecrets.azureWorkloadIdentity.enabled .Values.components.externalSecrets.azureWorkloadIdentity.clientId }}
{{- $_ := set $annotations "azure.workload.identity/client-id" .Values.components.externalSecrets.azureWorkloadIdentity.clientId }}
{{- end }}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-external-secrets"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ default "external-secrets" .Values.components.externalSecrets.helm.chart }}
    {{- if .Values.components.externalSecrets.helm.repository }}
    repoURL: {{ .Values.components.externalSecrets.helm.repository }}
    {{- else }}
    repoURL: {{ default "https://charts.external-secrets.io" .Values.global.helm.repository }}
    {{- end }}
    targetRevision: {{ default "2.6.0" .Values.components.externalSecrets.helm.targetRevision }}
    helm:
      releaseName: external-secrets
      values: |
        global:
          imagePullSecrets: {{ toYaml .Values.components.externalSecrets.imagePullSecrets | nindent 12 }}

        installCRDs: {{ .Values.components.externalSecrets.installCRDs }}

        # The Bitwarden SDK server is an optional sidecar subchart; disabled here.
        bitwarden-sdk-server:
          enabled: false

        replicaCount: {{ .Values.components.externalSecrets.replicaCount }}
        image: {{ default "{}" (include "externalSecrets.image" .) | nindent 10 }}
        imagePullSecrets: {{ toYaml .Values.components.externalSecrets.imagePullSecrets | nindent 10 }}

        resources: {{ toYaml .Values.components.externalSecrets.resources | nindent 10 }}
        nodeSelector: {{ toYaml .Values.components.externalSecrets.nodeSelector | nindent 10 }}
        tolerations: {{ toYaml .Values.components.externalSecrets.tolerations | nindent 10 }}
        {{- with .Values.components.externalSecrets.affinity }}
        affinity: {{ toYaml . | nindent 10 }}
        {{- end }}
        priorityClassName: {{ .Values.components.externalSecrets.priorityClassName | quote }}

        serviceAccount:
          create: {{ .Values.components.externalSecrets.serviceAccount.create }}
          {{- with .Values.components.externalSecrets.serviceAccount.name }}
          name: {{ . | quote }}
          {{- end }}
          {{- if gt (len $annotations) 0 }}
          annotations: {{ toYaml $annotations | nindent 12 }}
          {{- end }}

        {{- if and (eq .Values.global.provider "azure") .Values.components.externalSecrets.azureWorkloadIdentity.enabled }}
        podLabels:
          azure.workload.identity/use: "true"
        {{- end }}

        serviceMonitor:
          enabled: {{ .Values.components.externalSecrets.serviceMonitor.enabled }}

        webhook:
          replicaCount: {{ .Values.components.externalSecrets.webhook.replicaCount }}
          image: {{ default "{}" (include "externalSecrets.image" .) | nindent 12 }}
          imagePullSecrets: {{ toYaml .Values.components.externalSecrets.imagePullSecrets | nindent 12 }}
          resources: {{ toYaml .Values.components.externalSecrets.webhook.resources | nindent 12 }}
          nodeSelector: {{ toYaml .Values.components.externalSecrets.nodeSelector | nindent 12 }}
          tolerations: {{ toYaml .Values.components.externalSecrets.tolerations | nindent 12 }}
          priorityClassName: {{ .Values.components.externalSecrets.priorityClassName | quote }}

        certController:
          replicaCount: {{ .Values.components.externalSecrets.certController.replicaCount }}
          image: {{ default "{}" (include "externalSecrets.image" .) | nindent 12 }}
          imagePullSecrets: {{ toYaml .Values.components.externalSecrets.imagePullSecrets | nindent 12 }}
          resources: {{ toYaml .Values.components.externalSecrets.certController.resources | nindent 12 }}
          nodeSelector: {{ toYaml .Values.components.externalSecrets.nodeSelector | nindent 12 }}
          tolerations: {{ toYaml .Values.components.externalSecrets.tolerations | nindent 12 }}
          priorityClassName: {{ .Values.components.externalSecrets.priorityClassName | quote }}

  destination:
    name: {{ .Values.global.cluster }}
    namespace: external-secrets-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
