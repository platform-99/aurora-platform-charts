{{ if .Values.components.velero.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-velero-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: velero-netpol
      values: |
        resources:
          # Leader election and intra-namespace traffic between Velero components.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-same-namespace
              namespace: velero-system
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                  - podSelector: {}
              egress:
                - to:
                  - podSelector: {}
          # Velero backs up and restores Kubernetes resources via the API server.
          # endpointSelector: {} covers the main Deployment and Helm hook Jobs (e.g.
          # velero-upgrade-crds) whose pod templates omit app.kubernetes.io/name.
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-apiserver-from-velero
              namespace: velero-system
            spec:
              description: |
                Velero reads and writes cluster resources via the Kubernetes API.
                Ports 443 and 6443 cover both ways the API server is reached: the in-cluster
                kubernetes Service (443) and the API server's native secure port (6443).
              endpointSelector: {}
              egress:
                - toEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "443"
                        - port: "6443"
          # Velero must resolve S3 / Azure Blob and other object-storage hostnames.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-dns-from-velero
              namespace: velero-system
            spec:
              egress:
              - ports:
                - port: 53
                  protocol: TCP
                - port: 53
                  protocol: UDP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector: {}
              policyTypes:
              - Egress
          # Velero uploads backups and manages volume snapshots via cloud APIs over HTTPS.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-https-from-velero
              namespace: velero-system
            spec:
              egress:
              - ports:
                - port: 443
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector: {}
              policyTypes:
              - Egress
          {{- if eq .Values.global.provider "aws" }}
          # On AWS with EKS Pod Identity, the Pod Identity Agent serves temporary credentials from the
          # node-local endpoint 169.254.170.23:80. Cilium represents the node as the `host` entity, so
          # egress must target `toEntities: [host]` rather than an ipBlock CIDR (Cilium does not match
          # link-local node addresses via CIDR-based policies). Velero needs this path to obtain IAM
          # credentials for S3 backup storage and volume snapshots.
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-eks-pod-identity-from-velero
              namespace: velero-system
            spec:
              endpointSelector: {}
              egress:
                - toEntities:
                    - host
                  toPorts:
                    - ports:
                        - port: "80"
                          protocol: TCP
          {{- end }}
          # kube-prometheus-stack scrapes the Velero metrics port (8085).
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-ingress-from-prometheus-to-velero
              namespace: velero-system
            spec:
              ingress:
              - ports:
                - port: 8085
                  protocol: TCP
                from:
                - namespaceSelector:
                    matchLabels:
                      namespace.ssc-spc.gc.ca/purpose: system
                      kubernetes.io/metadata.name: prometheus-system
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
                      app.kubernetes.io/instance: kube-prometheus-stack-prometheus
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: velero
              policyTypes:
              - Ingress
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
