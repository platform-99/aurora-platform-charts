{{ if .Values.components.externalDns.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-external-dns-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: external-dns-netpol
      values: |
        resources:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-same-namespace
              namespace: external-dns-system
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                  - podSelector: {}
              egress:
                - to:
                  - podSelector: {}
          # ExternalDNS talks to cloud control planes over HTTPS (e.g. Route53, Azure Resource Manager,
          # Cloud DNS). Without this, sync loops cannot create or update DNS records.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-https-from-external-dns
              namespace: external-dns-system
            spec:
              egress:
              - ports:
                - port: 443
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: external-dns
              policyTypes:
              - Egress
          # The pod must resolve API hostnames (cluster DNS and/or recursive resolvers). DNS uses 53/tcp
          # and 53/udp; blocking it breaks provider connectivity even when HTTPS is allowed.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-dns-from-external-dns
              namespace: external-dns-system
            spec:
              egress:
              - ports:
                - port: 53
                  protocol: TCP
                - port: 53
                  protocol: UDP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: external-dns
              policyTypes:
              - Egress
          {{- if eq .Values.global.provider "azure" }}
          # On Azure, identity and instance metadata are served from the link-local metadata endpoint.
          # Workload identity / MSI-style flows need this path; mirror other platform components (e.g. cert-manager).
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-azure-metadata-from-external-dns
              namespace: external-dns-system
            spec:
              egress:
              - ports:
                - port: 80
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: {{ required "global.azureMetadataApiCidr is required" .Values.global.azureMetadataApiCidr | quote }}
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: external-dns
              policyTypes:
              - Egress
          {{- end }}
          # kube-prometheus-stack scrapes the ExternalDNS metrics port; without ingress from Prometheus,
          # ServiceMonitor-based scraping fails when the namespace enforces default deny ingress.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-ingress-from-prometheus-to-external-dns
              namespace: external-dns-system
            spec:
              ingress:
              - from:
                - namespaceSelector:
                    matchLabels:
                      namespace.ssc-spc.gc.ca/purpose: system
                      kubernetes.io/metadata.name: prometheus-system
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
                      app.kubernetes.io/instance: kube-prometheus-stack-prometheus
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: external-dns
              policyTypes:
              - Ingress
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
