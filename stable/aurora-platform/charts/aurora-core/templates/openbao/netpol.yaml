{{ if .Values.components.openbao.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-openbao-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: openbao-netpol
      values: |
        resources:
          # OpenBao server pods talk to each other on 8201 (Raft cluster traffic and
          # request forwarding); allowing the namespace covers intra-cluster traffic.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-same-namespace
              namespace: openbao-system
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                  - podSelector: {}
              egress:
                - to:
                  - podSelector: {}
          # Workloads that consume OpenBao secrets (labeled like Vault-injected pods)
          # reach the OpenBao API on 8200. fromEndpoints matches the label in any
          # namespace, so consumers across the cluster can authenticate and read secrets.
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-ingress-from-consumers-to-openbao
              namespace: openbao-system
            spec:
              description: |
                OpenBao secret consumers connect to the OpenBao API on 8200.
              endpointSelector: {}
              ingress:
                - fromEndpoints:
                    - matchLabels:
                        secrets.ssc-spc.gc.ca/vault: "yes"
                  toPorts:
                    - ports:
                        - port: "8200"
          # kube-prometheus-stack scrapes OpenBao telemetry, exposed on the API port.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-ingress-from-prometheus-to-openbao
              namespace: openbao-system
            spec:
              ingress:
              - ports:
                - port: 8200
                  protocol: TCP
                from:
                - namespaceSelector:
                    matchLabels:
                      namespace.ssc-spc.gc.ca/purpose: system
                      kubernetes.io/metadata.name: prometheus-system
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
                      app.kubernetes.io/instance: kube-prometheus-stack-prometheus
              podSelector: {}
              policyTypes:
              - Ingress
          # OpenBao uses the Kubernetes service_registration backend (active/standby
          # labeling) and Raft leader election, which update pod state via the API server.
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-apiserver-from-openbao
              namespace: openbao-system
            spec:
              description: |
                OpenBao updates its Kubernetes service registration and reads auth data
                via the API server.
                Ports 443 and 6443 cover both ways the API server is reached: the in-cluster
                kubernetes Service (443) and the API server's native secure port (6443).
              endpointSelector: {}
              egress:
                - toEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "443"
                        - port: "6443"
          # OpenBao must resolve cluster and cloud hostnames (e.g. the KMS / Key Vault
          # auto-unseal endpoint). DNS uses 53/tcp and 53/udp.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-dns-from-openbao
              namespace: openbao-system
            spec:
              egress:
              - ports:
                - port: 53
                  protocol: TCP
                - port: 53
                  protocol: UDP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector: {}
              policyTypes:
              - Egress
          # Auto-unseal reaches the cloud KMS / Key Vault endpoint over HTTPS.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-https-from-openbao
              namespace: openbao-system
            spec:
              egress:
              - ports:
                - port: 443
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector: {}
              policyTypes:
              - Egress
          {{- if eq .Values.global.provider "aws" }}
          # On AWS with EKS Pod Identity, the Pod Identity Agent serves temporary
          # credentials from the node-local endpoint 169.254.170.23:80. Cilium represents
          # the node as the `host` entity, so egress must target `toEntities: [host]`
          # rather than an ipBlock CIDR (Cilium does not match link-local node addresses
          # via CIDR-based policies). OpenBao needs this path to obtain IAM credentials
          # for AWS KMS auto-unseal.
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-eks-pod-identity-from-openbao
              namespace: openbao-system
            spec:
              endpointSelector: {}
              egress:
                - toEntities:
                    - host
                  toPorts:
                    - ports:
                        - port: "80"
                          protocol: TCP
          {{- end }}
          {{- if eq .Values.global.provider "azure" }}
          # On Azure, workload identity / IMDS-style flows fetch tokens from the
          # link-local metadata endpoint for Key Vault auto-unseal.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-azure-metadata-from-openbao
              namespace: openbao-system
            spec:
              egress:
              - ports:
                - port: 80
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: {{ required "global.azureMetadataApiCidr is required" .Values.global.azureMetadataApiCidr | quote }}
              podSelector: {}
              policyTypes:
              - Egress
          {{- end }}
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
