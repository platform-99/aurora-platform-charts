{{ if .Values.components.keda.enabled -}}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: "{{ .Values.global.cluster }}-keda-netpol"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.global.project }}
  source:
    chart: {{ .Values.global.raw.helm.chart }}
    repoURL: {{ default .Values.global.helm.repository .Values.global.raw.helm.repository }}
    targetRevision: {{ .Values.global.raw.helm.targetRevision }}
    helm:
      releaseName: keda-netpol
      values: |
        resources:
          # The metrics API server queries the operator's gRPC metrics service (9666),
          # so allowing the namespace covers intra-component traffic.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-same-namespace
              namespace: keda-system
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
                - Egress
              ingress:
                - from:
                  - podSelector: {}
              egress:
                - to:
                  - podSelector: {}
          # The KEDA metrics API server is registered as an aggregated APIService
          # (v1beta1.external.metrics.k8s.io); the API server proxies external-metrics
          # requests to it on 6443.
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-ingress-from-apiserver-to-keda-metrics
              namespace: keda-system
            spec:
              description: |
                API server reaches the KEDA external metrics APIService.
              endpointSelector:
                matchLabels:
                  app.kubernetes.io/name: keda-operator-metrics-apiserver
              ingress:
                - fromEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "6443"
          # The API server calls the KEDA admission webhook (ScaledObject validation) on 9443.
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-ingress-from-apiserver-to-keda-webhooks
              namespace: keda-system
            spec:
              description: |
                API server calls the KEDA admission webhook.
              endpointSelector:
                matchLabels:
                  app.kubernetes.io/name: keda-admission-webhooks
              ingress:
                - fromEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "9443"
          # The operator reconciles ScaledObjects/HPAs, the metrics server reads the
          # metrics API, and the webhook is registered, all via the API server.
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-apiserver-from-keda
              namespace: keda-system
            spec:
              description: |
                KEDA components manage HPAs/ScaledObjects and read the metrics API via the API server.
                Ports 443 and 6443 cover both ways the API server is reached: the in-cluster
                kubernetes Service (443) and the API server's native secure port (6443).
              endpointSelector: {}
              egress:
                - toEntities:
                    - kube-apiserver
                  toPorts:
                    - ports:
                        - port: "443"
                        - port: "6443"
          # KEDA scalers must resolve cluster and external event-source hostnames.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-dns-from-keda
              namespace: keda-system
            spec:
              egress:
              - ports:
                - port: 53
                  protocol: TCP
                - port: 53
                  protocol: UDP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector: {}
              policyTypes:
              - Egress
          # KEDA scalers connect to external event sources and cloud APIs over HTTPS
          # (queues, cloud monitoring, IRSA STS endpoint, etc.).
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-https-from-keda
              namespace: keda-system
            spec:
              egress:
              - ports:
                - port: 443
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              podSelector: {}
              policyTypes:
              - Egress
          {{- if eq .Values.global.provider "aws" }}
          # On AWS with EKS Pod Identity, the Pod Identity Agent serves temporary
          # credentials from the node-local endpoint 169.254.170.23:80. Cilium represents
          # the node as the `host` entity, so egress must target `toEntities: [host]`
          # rather than an ipBlock CIDR (Cilium does not match link-local node addresses
          # via CIDR-based policies). KEDA scalers use this to authenticate to AWS event
          # sources (CloudWatch, SQS, etc.).
          - apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: allow-egress-to-eks-pod-identity-from-keda
              namespace: keda-system
            spec:
              endpointSelector: {}
              egress:
                - toEntities:
                    - host
                  toPorts:
                    - ports:
                        - port: "80"
                          protocol: TCP
          {{- end }}
          {{- if eq .Values.global.provider "azure" }}
          # On Azure, workload identity / IMDS-style flows fetch tokens from the
          # link-local metadata endpoint for scaler authentication.
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-egress-to-azure-metadata-from-keda
              namespace: keda-system
            spec:
              egress:
              - ports:
                - port: 80
                  protocol: TCP
                to:
                - ipBlock:
                    cidr: {{ required "global.azureMetadataApiCidr is required" .Values.global.azureMetadataApiCidr | quote }}
              podSelector: {}
              policyTypes:
              - Egress
          {{- end }}
          # kube-prometheus-stack scrapes the KEDA component metrics (8080).
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-ingress-from-prometheus-to-keda
              namespace: keda-system
            spec:
              ingress:
              - ports:
                - port: 8080
                  protocol: TCP
                from:
                - namespaceSelector:
                    matchLabels:
                      namespace.ssc-spc.gc.ca/purpose: system
                      kubernetes.io/metadata.name: prometheus-system
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
                      app.kubernetes.io/instance: kube-prometheus-stack-prometheus
              podSelector: {}
              policyTypes:
              - Ingress
  destination:
    name: {{ .Values.global.cluster }}
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

{{- end }}
